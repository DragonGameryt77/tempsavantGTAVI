<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Compte à rebours GTA VI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Image en haut, en pleine largeur -->
  <img src="logogtavi.png" alt="Logo GTA VI" class="banner">

  <h1>Sortie de GTA VI dans :</h1>

  <div id="countdown">
    <div class="time-box">
      <div id="days">0</div>
      <div class="label">Jours</div>
    </div>
    <div class="time-box">
      <div id="hours">0</div>
      <div class="label">Heures</div>
    </div>
    <div class="time-box">
      <div id="minutes">0</div>
      <div class="label">Minutes</div>
    </div>
    <div class="time-box">
      <div id="seconds">0</div>
      <div class="label">Secondes</div>
    </div>
  </div>

  <script src="script.js">
  </script>

</body>
</html>
